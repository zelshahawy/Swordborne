<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>SwordBorne</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Georgia, serif;
        background: #09080d;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(83, 115, 175, 0.22), transparent 45%),
          radial-gradient(circle at bottom, rgba(146, 65, 33, 0.22), transparent 40%),
          #09080d;
      }

      #bevy-container {
        width: 100vw;
        height: 100vh;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="bevy-container"></div>
    <script type="module">
      import init from "./bevy_game.js";

      init().catch((error) => {
        console.error("Failed to start SwordBorne", error);
      });
    </script>
  </body>
</html>
